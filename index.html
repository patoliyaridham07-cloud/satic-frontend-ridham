<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ridham Patoliya - Frontend Internship</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <nav class="navbar">
    <div class="logo">Ridham</div>

    <ul class="nav-links">
      <li><a href="#" class="active">Home</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Contact</a></li>
      <li class="mobile-only">
        <button class="btn btn-primary">Hire Me</button>
      </li>
    </ul>

    <button class="btn btn-primary desktop-only">Hire Me</button>
    <div class="hamburger">☰</div>
  </nav>
</header>

<main>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Find Your Internship</h1>

      <form id="searchForm" class="search-bar">
        <input type="text" placeholder="Search internships...">
        <button type="submit">🔍</button>
      </form>
    </div>
  </section>

  <!-- Projects Section -->
  <section class="projects">
    <h2>My Projects</h2>

    <div class="projects-container">

      <div class="project-card">
        <h3>Portfolio Website</h3>
        <p>Personal site built with HTML/CSS.</p>
        <button>View Project</button>
      </div>

      <div class="project-card">
        <h3>Weather App</h3>
        <p>React app that fetches live weather.</p>
        <button>View Project</button>
      </div>

      <div class="project-card">
        <h3>E-commerce Platform</h3>
        <p>Full-stack shop with cart & payment.</p>
        <button>View Project</button>
      </div>

    </div>
  </section>

  <!-- Notification Section -->
  <section class="notification-section">
    <h2>Notification Playground</h2>

    <button id="successBtn" class="secondary-btn">
      Trigger Success
    </button>

    <button id="errorBtn" class="secondary-btn">
      Trigger Error
    </button>
  </section>

</main>

<footer>
  <p>© 2026 Ridham Patoliya</p>
</footer>

<div id="toast-container"></div>
<script src="js/script.js"></script>

</body>
